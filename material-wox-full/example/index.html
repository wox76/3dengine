<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/svg+xml" href="favicon.svg" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>WOX 3D ENGINE</title>
</head>

<body style="display: none;">
	<canvas class="webgl"></canvas>
	<div id="loading"></div>
	<div id="orbitControlsDomElem" style="position: absolute; width: 100vw; height: 100vh; opacity: 0; cursor: grab">
	</div>
	<!-- Scene Explorer Tool Panel (Toggled via Q) -->
	<div id="scene-tool-panel" style="display: none; position: absolute; top: 16px; left: 16px; width: 380px; max-height: calc(100vh - 32px); background: rgba(10, 12, 16, 0.88); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-family: sans-serif; z-index: 1001; flex-direction: column; overflow: hidden; box-shadow: 0 12px 36px rgba(0,0,0,0.5);">
		<div style="padding: 14px 18px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.02); user-select: none;">
			<h3 style="margin: 0; font-size: 14px; font-weight: bold; letter-spacing: 0.5px;">🛠️ WOX SCENE EXPLORER</h3>
			<div style="display: flex; align-items: center; gap: 8px;">
				<button id="toggle-fullscreen-panel" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; transition: all 0.2s; outline: none;">Espandi Altezza</button>
				<span style="font-size: 11px; color: #888; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;">Q</span>
			</div>
		</div>
		
		<div style="padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex-grow: 1;">
			<!-- GLB Upload button -->
			<div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); display: flex; flex-direction: column; gap: 6px;">
				<label style="font-size: 13px; font-weight: 500;">Carica Modello 3D</label>
				<label for="glb-upload" style="background: #6366f1; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; display: block; text-align: center; box-shadow: 0 4px 10px rgba(99,102,241,0.25); transition: background 0.2s; font-size: 12px; user-select: none;">
					📁 Carica file GLB / GLTF
				</label>
				<input type="file" id="glb-upload" accept=".glb,.gltf" style="display: none;" />
			</div>

			<!-- Debug Toggle -->
			<div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); display: flex; flex-direction: column; gap: 8px;">
				<div style="display: flex; justify-content: space-between; align-items: center;">
					<label style="font-size: 13px; font-weight: 500;">Attiva Pannello Debug SSGI</label>
					<input type="checkbox" id="debug-toggle" style="width: 16px; height: 16px; cursor: pointer;" />
				</div>
				<!-- Container for SSGIDebugGUI Tweakpane -->
				<div id="debug-pane-container" style="display: none; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; margin-top: 4px;"></div>
			</div>

			<!-- POWER Mode Toggle -->
			<div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); display: flex; flex-direction: column; gap: 8px;">
				<div style="display: flex; justify-content: space-between; align-items: center;">
					<label style="font-size: 13px; font-weight: 500; color: #fbbf24; display: flex; align-items: center; gap: 6px;">⚡ Attiva Modalità POWER</label>
					<input type="checkbox" id="power-mode-toggle" style="width: 16px; height: 16px; cursor: pointer;" />
				</div>
			</div>

			<!-- HDR Selector -->
			<div style="display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04);">
				<label style="font-size: 13px; font-weight: 500;">Illuminazione Ambientale (HDR)</label>
				<select id="hdr-select" style="background: #151821; color: white; border: 1px solid rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; outline: none; font-size: 12px; cursor: pointer; width: 100%;">
				</select>
				<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
					<span style="font-size: 11px; color: #888;">Intensità HDR (<span id="val-hdr-exposure">1.30</span>)</span>
					<input type="range" id="hdr-exposure" min="0.1" max="4.0" step="0.05" value="1.30" style="width: 120px; cursor: pointer;" />
				</div>
			</div>

			<!-- Hierarchy -->
			<div style="display: flex; flex-direction: column; gap: 8px;">
				<div style="display: flex; justify-content: space-between; align-items: center;">
					<label style="font-size: 13px; font-weight: 500;">Gerarchia Oggetti</label>
					<select id="filter-type" style="background: #151821; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; outline: none;">
						<option value="all">Tutti</option>
						<option value="Mesh">Mesh (Geometrie)</option>
						<option value="Light">Luci</option>
						<option value="Camera">Camere</option>
						<option value="Group">Gruppi / Altro</option>
					</select>
				</div>
				<div id="hierarchy-tree" style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; height: 180px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 11px; display: flex; flex-direction: column; gap: 4px;">
				</div>
			</div>

			<!-- Camera Inspector -->
			<div id="camera-inspector" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 10px;">
				<h4 style="margin: 0; font-size: 12px; color: #fbbf24; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 6px;">Proprietà Camera</h4>
				<div style="display: flex; justify-content: space-between; align-items: center;">
					<span style="font-size: 11px; color: #aaa; font-weight: 500;">FOV (<span id="val-camera-fov" style="color: #fbbf24; font-weight: bold;">40</span>)</span>
					<input type="range" id="camera-fov" min="10" max="120" step="1" value="40" style="width: 140px; cursor: pointer;" />
				</div>
			</div>

			<!-- Inspector -->
			<div id="properties-inspector" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; display: none; flex-direction: column; gap: 10px;">
				<h4 id="inspect-obj-name" style="margin: 0; font-size: 12px; color: #6366f1; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 6px;">Proprietà Oggetto</h4>
				<div id="inspect-controls" style="display: flex; flex-direction: column; gap: 8px;">
				</div>
			</div>

			<!-- Performance Stats Holder -->
			<div id="stats-holder" style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 6px;">
				<label style="font-size: 12px; color: #888; font-weight: 500;">Performance (FPS / Frame Time)</label>
			</div>
		</div>
	</div>

	<!-- Materials Select Panel (On the Right) -->
	<div id="materials-select-panel" style="display: none; position: absolute; top: 16px; right: 16px; width: 320px; max-height: calc(100vh - 32px); background: rgba(10, 12, 16, 0.88); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-family: sans-serif; z-index: 1001; flex-direction: column; overflow: hidden; box-shadow: 0 12px 36px rgba(0,0,0,0.5);">
		<div style="padding: 14px 18px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.02); user-select: none;">
			<h3 style="margin: 0; font-size: 13px; font-weight: bold; letter-spacing: 0.5px;">🎨 LISTA MATERIALI</h3>
			<button id="close-select-panel" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold;">Chiudi</button>
		</div>
		<div id="materials-list" style="padding: 14px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-grow: 1;">
		</div>
	</div>

	<!-- Material Detail Panel (Further Left from the List) -->
	<div id="material-detail-panel" style="display: none; position: absolute; top: 16px; right: 352px; width: 360px; max-height: calc(100vh - 32px); background: rgba(10, 12, 16, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; color: white; font-family: sans-serif; z-index: 1001; flex-direction: column; overflow: hidden; box-shadow: 0 12px 36px rgba(0,0,0,0.6);">
		<div style="padding: 14px 18px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.02); user-select: none;">
			<h3 id="detail-mat-name" style="margin: 0; font-size: 13px; font-weight: bold; color: #10b981; letter-spacing: 0.5px;">PROPRIETÀ MATERIALE</h3>
			<button id="close-detail-panel" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold;">Chiudi</button>
		</div>
		<div style="padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex-grow: 1;">
			<!-- Parameters -->
			<div id="detail-parameters" style="display: flex; flex-direction: column; gap: 10px; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04);">
			</div>
			<!-- ComfyUI Texture Generator -->
			<div style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; gap: 8px;">
				<h4 style="margin: 0; font-size: 11px; font-weight: bold; color: #6366f1; letter-spacing: 0.5px;">🤖 COMFYUI TEXTURE GENERATOR</h4>
				<div style="display: flex; flex-direction: column; gap: 4px;">
					<label style="font-size: 10px; color: #888;">URL ComfyUI</label>
					<input type="text" id="comfy-url" value="http://127.0.0.1:8188" style="background: #151821; color: white; border: 1px solid rgba(255,255,255,0.15); padding: 6px; border-radius: 6px; font-size: 11px; outline: none;" />
				</div>
				<div style="display: flex; flex-direction: column; gap: 4px;">
					<label style="font-size: 10px; color: #888;">Descrizione Materiale (Prompt)</label>
					<textarea id="comfy-prompt" placeholder="E.g., rusty metal plates, mossy stone bricks, polished gold..." rows="2" style="background: #151821; color: white; border: 1px solid rgba(255,255,255,0.15); padding: 6px; border-radius: 6px; font-size: 11px; outline: none; resize: vertical; font-family: sans-serif;"></textarea>
				</div>
				<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2px;">
					<label style="font-size: 11px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none;">
						<input type="checkbox" id="comfy-use-ref" style="cursor: pointer;" /> Usa Albedo come riferimento
					</label>
				</div>
				<div id="comfy-denoise-container" style="display: none; flex-direction: column; gap: 4px; margin-top: 2px;">
					<div style="display: flex; justify-content: space-between; align-items: center;">
						<label style="font-size: 10px; color: #aaa;">Forza Denoise / Cambiamento</label>
						<span id="val-comfy-denoise" style="font-size: 10px; color: #10b981; font-weight: bold;">0.70</span>
					</div>
					<input type="range" id="comfy-denoise" min="0.1" max="1.0" step="0.05" value="0.70" style="width: 100%; cursor: pointer;" />
				</div>
				<div style="display: flex; justify-content: space-between; align-items: center;">
					<label style="font-size: 11px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none;">
						<input type="checkbox" id="comfy-seamless" checked style="cursor: pointer;" /> Genera Seamless (Ripetibile)
					</label>
				</div>
				<button id="btn-comfy-generate" style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; transition: all 0.2s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);">
					🚀 Genera con ComfyUI
				</button>
				<div id="comfy-status" style="font-size: 10px; color: #888; text-align: center; display: none;"></div>
			</div>
			<!-- Texture Previews -->
			<div style="display: flex; flex-direction: column; gap: 8px;">
				<h4 style="margin: 0; font-size: 12px; font-weight: bold; color: #888;">MAPPE PBR CONFIGURATE</h4>
				<div id="detail-textures-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
				</div>
			</div>
		</div>
	</div>

	<!-- Floating Debug Console for Live Troubleshooting -->
	<div id="wox-console-log" style="position: absolute; bottom: 16px; left: 16px; width: 380px; height: 140px; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #10b981; font-family: monospace; font-size: 10px; overflow-y: auto; padding: 10px; z-index: 10002; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 4px; box-sizing: border-box;">
		<div style="font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 4px; color: #6366f1;">📟 WOX SYSTEM LOGS</div>
		<div id="wox-logs-content" style="flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;">
			WOX Engine initialized...
		</div>
	</div>

	<script type="module" src="/main.js"></script>
</body>

</html>
